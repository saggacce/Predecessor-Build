<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PrimeSight">
  <defs>
    <!-- Outer hex border: teal → blue → violet -->
    <linearGradient id="rim" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38d4c8"/>
      <stop offset=".48" stop-color="#5b9cf6"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Diagonal lane: teal → white → gold -->
    <linearGradient id="lane" x1="12" y1="52" x2="52" y2="12" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38d4c8"/>
      <stop offset=".5" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#f0b429"/>
    </linearGradient>
    <!-- Prime core: bright gold -->
    <radialGradient id="prime" cx="32" cy="32" r="13" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff4cc"/>
      <stop offset=".4" stop-color="#f0b429"/>
      <stop offset="1" stop-color="#7a4a10"/>
    </radialGradient>
    <!-- Prime glow -->
    <filter id="primeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.94  0 0 0 0 0.71  0 0 0 0 0.16  0 0 0 .7 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Hex body -->
  <path d="M32 4 53 15v22L32 60 11 37V15L32 4Z" fill="#0a0c10"/>
  <path d="M32 4 53 15v22L32 60 11 37V15L32 4Z" fill="url(#rim)" opacity=".12"/>
  <path d="M32 4 53 15v22L32 60 11 37V15L32 4Z"
        fill="none" stroke="url(#rim)" stroke-width="2.4" stroke-linejoin="round"/>

  <!-- Lane diagonals -->
  <path d="M13 50 51 13" stroke="url(#lane)" stroke-width="2.2" stroke-linecap="round" opacity=".9"/>
  <path d="M13 13 51 50" stroke="#38d4c8" stroke-width="1.6" stroke-linecap="round" opacity=".5"/>

  <!-- Horizontal axis — blue (primary analysis) -->
  <path d="M14 32h36" stroke="#5b9cf6" stroke-width="1.8" stroke-linecap="round" opacity=".72"/>

  <!-- Lane zigzags -->
  <path d="M17 17h11l4 5 4-5h11" fill="none" stroke="#38d4c8"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity=".75"/>
  <path d="M17 47h11l4-5 4 5h11" fill="none" stroke="#f0b429"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity=".75"/>

  <!-- Objective dots at corners -->
  <circle cx="20" cy="44" r="1.9" fill="#38d4c8" opacity=".9"/>
  <circle cx="44" cy="20" r="1.9" fill="#f0b429" opacity=".9"/>
  <circle cx="20" cy="20" r="1.5" fill="#a78bfa" opacity=".8"/>
  <circle cx="44" cy="44" r="1.5" fill="#5b9cf6" opacity=".8"/>

  <!-- Prime ring + core -->
  <circle cx="32" cy="32" r="9" fill="#0d1118" stroke="#e2e8f0" stroke-width="1.5" opacity=".95"/>
  <circle cx="32" cy="32" r="5.8" fill="url(#prime)" filter="url(#primeGlow)"/>
  <path d="M32 26.2v11.6M26.2 32h11.6"
        stroke="#0a0c10" stroke-width="1.8" stroke-linecap="round" opacity=".88"/>

  <!-- Edge dashes -->
  <path d="M26 10h16M26 54h16" stroke="#e2e8f0" stroke-width="1.4" stroke-linecap="round" opacity=".4"/>
</svg>
